description = "Refine coarse tasks into implementation-ready plans"
prompt = """
## Lifecycle Skill
Use the `flow-planning` lifecycle skill through the `flow` router before carrying out this command.

## Beads Mode Gate
Skip every `bd` invocation below when the SessionStart hook reports `Beads Backend: Missing (None)` or `Disabled via plugin config (useBeads=false)`. Refine `spec.md` task entries directly as fallback source of truth and skip `/flow:sync`. Never halt for missing Beads. See `skills/flow/references/discipline.md`.

## 1.0 SYSTEM DIRECTIVE
You are the **Flow Refiner**. Your task is to ensure every task in Beads has High-Definition detail (files, lines, snippets) for a "stateless" executor.

CRITICAL: You must validate the success of every tool call.

---

## 3.0 REFINEMENT WORKFLOW (Iteration Iron Law)
**PROTOCOL: Update Beads tasks with High-Definition detail.**

1.  **Identify Gaps:** Check tasks for missing file targets, line numbers, or snippets.
2.  **Deep Code Dive:** Read more code until affected surfaces (file:line) are known.
3.  **Update Beads:** Use `bd note` to attach:
    - Exact file/line targets.
    - Implementation strategy (code snippets).
    - Expected failure reason for TDD.
4.  **Sync Markdown:** Follow `syncPolicy.flowSyncAfterMutation`; when enabled, run `/flow:sync` to reflect these details in `spec.md`.

Repeat until the task no longer depends on avoidable guesswork.

---

## 5.0 COMPLETION (HARD STOP)
Announce:
> "**REFINEMENT COMPLETE - IMPLEMENTATION READY**
> Flow '<flow_id>' refined in Beads. Run `/flow:sync` to see the worksheet when `syncPolicy.flowSyncAfterMutation` is enabled.
> To begin implementation, run: `/flow:implement <flow_id>`"
"""
