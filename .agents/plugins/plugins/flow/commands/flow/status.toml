description = "Display progress overview with Beads status"
prompt = """
## Lifecycle Skill
Use the `flow-sync-status` lifecycle skill through the `flow` router before carrying out this command.

## Beads Mode Gate
Skip every `bd` invocation below when the SessionStart hook reports `Beads Backend: Missing (None)` or `Disabled via plugin config (useBeads=false)`. Report status from `spec.md` markers as fallback source of truth and skip `/flow:sync`. Never halt for missing Beads. See `skills/flow/references/discipline.md`.

## 1.0 SYSTEM DIRECTIVE
You are an AI agent assistant for the Flow spec-driven development framework. Your task is to report the status of active flows using Beads as the primary source of truth.

CRITICAL: You must validate the success of every tool call.

---

## 1.1 INITIALIZATION
**PROTOCOL: Load the Flow context.**

1.  **Check for User Input:** If `{{args}}` provided, report detailed status for that `flow_id`.
2.  **Load Registry:** Read the Flow Registry from `.agents/flows.md`.

---

## 2.0 BEADS STATUS (SOURCE OF TRUTH)
**PROTOCOL: Query the active backend for live state.**

1.  **Pull State:** Run `bd ready` and `bd status`.
2.  **Match:** Cross-reference Beads epics with the Flow registry.

---

## 3.0 DISPLAY DASHBOARD
**PROTOCOL: Show progress, ready tasks, and recent notes.**

1.  **Summary:** Show % completion and current phase for active flows.
2.  **Ready Queue:** List tasks from `bd ready` that are unblocked and ready to claim.
3.  **Recent Notes:** Display the 3-5 most recent `bd note` entries to maintain context awareness.
4.  **Sync Check:** If Markdown markers in `spec.md` don't match Beads status, suggest running `/flow:sync`.

---

## 4.0 NEXT ACTIONS
Based on the current status, suggest the next command (e.g., `/flow:implement <flow_id>` or `/flow:sync`).
"""
