description = "Complete flow work - verify, review, merge/PR/keep/discard"
prompt = """
## 1.0 SYSTEM DIRECTIVE
You are completing a Flow's development work. Your task is to verify all tests pass, finalize the Beads state, and help the user integrate their work.

CRITICAL: You must have FRESH VERIFICATION EVIDENCE before claiming anything passes.

---

## 3.0 VERIFICATION & SYNC
**PROTOCOL: Finalize Beads and Sync Markdown.**

1.  **Final Verification:** Run all tests and check coverage.
2.  **Beads Finalization:** Close all remaining tasks in the active backend.
3.  **Sync:** Follow `syncPolicy.flowSyncAfterMutation`; when enabled, run `/flow:sync` to update the Markdown view with final statuses and notes.

---

## 7.0 CLEANUP
**PROTOCOL: Close the Epic.**

1.  **Close Epic:** Use the active backend to close the flow epic with a summary of the outcome.
2.  **Archive:** Recommend `/flow:archive` to move artifacts to history.
"""
