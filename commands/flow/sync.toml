description = "Synchronize context docs, Beads state, and export summaries"
prompt = """
## 1.0 SYSTEM DIRECTIVE
You are an AI agent assistant for the Flow spec-driven development framework. Your task is to synchronize the current active backend task state back to the on-disk `spec.md` for a flow, refresh context documents based on the codebase, and optionally generate an export summary.

CRITICAL: You must validate the success of every tool call. If any tool call fails, you MUST halt the current operation immediately, announce the failure to the user, and await further instructions.

---

## 1.1 PARSE OPTIONS
**PROTOCOL: Determine the scope of this sync operation.**

1.  **Check Arguments:** 
    *   If `{{args}}` contains `--export`, set a flag to generate an export summary at the end.
    *   Otherwise, standard sync and refresh.

---

## 2.0 ACTIVE BACKEND STATUS EXPORT
**PROTOCOL: Export active backend state (status + notes) to disk.**

1.  **Determine Flow:** Read `.agents/flows.md` for active flows.
2.  **Load Flow Metadata:** Read `.agents/specs/<flow_id>/metadata.json`, `.agents/specs/<flow_id>/spec.md`.
3.  **Resolve Active Backend:** `bd` or `none`.
4.  **Fetch States:**
    *   **Backend State:** Pull all tasks AND notes/comments.
5.  **Regenerate Spec Task Section:**
    *   Map backend statuses to markdown markers.
    *   Match tasks by title.
    *   Append commit SHAs from backend.
6.  **Update Learnings:**
    *   Extract backend notes.
    *   Append new notes to `.agents/specs/<flow_id>/learnings.md` in Ralph-style.
7.  **Update Metadata:** Set `"synced_at"` and `"updated_at"`.

---

## 3.0 DETECT CONTEXT DRIFT
**PROTOCOL: Refresh context to match codebase state.**

1.  Scan for current dependencies: `package.json`, `pyproject.toml`, `Cargo.toml`, or `go.mod`.
2.  Compare with `.agents/tech-stack.md`.
3.  Inspect workflow drift across `Makefile`, `justfile`, `Taskfile.yml`, package scripts, `.pre-commit-config.yaml`, and CI files.
4.  Compare those command surfaces with `.agents/workflow.md`.
5.  If tech stack drift, canonical command drift, backend assumption drift, or ignore-policy drift is detected, note it for reporting.

---

## 4.0 KNOWLEDGE SYNTHESIS & FILE VALIDATION
**PROTOCOL: Synthesize learnings and validate references.**

1.  **Knowledge Synthesis (MANDATORY):**
    *   Read `.agents/specs/<flow_id>/learnings.md`.
    *   Synthesize learnings directly into cohesive, logically organized knowledge base chapters in `.agents/knowledge/` (e.g., `architecture.md`, `conventions.md`).
    *   Update the current state. Do NOT outline history or create per-flow logs.
2.  **Pattern Elevation:** Extract reusable patterns to `.agents/patterns.md`.
3.  **Workflow Learning Capture:** If the sync reveals validated repo-native commands or repeated user corrections that are missing from `.agents/workflow.md`, propose updating the workflow and knowledge base so those commands stop living only in chat memory.
4.  **File Validation:** Check file paths referenced in `spec.md` files and `patterns.md`.
5.  Report any broken references found.

---

## 5.0 OFFER UPDATES
**PROTOCOL: User Interaction.**

1.  For each drift or new pattern detected, ask the user explicitly:
    > **Update {file}?**
    > Change: {description}
    > A) Yes - Apply update
    > B) No - Skip this change
2.  Apply approved changes and store refresh state in `.agents/refresh_state.json`.
3.  If workflow drift is detected, explicitly ask:
    > "Workflow settings may be stale. Revalidate `.agents/workflow.md` now?"
4.  Prefer repo-native aggregate commands such as `make lint`, `make test`, `make check`, `just check`, `task test`, package scripts, and pre-commit entrypoints when proposing workflow updates.

---

## 6.0 EXPORT PROJECT SUMMARY (If requested)
**PROTOCOL: Generate comprehensive JSON/Markdown export.**

1.  **If `--export` was passed or user requested it:**
    * Gather Active PRDs from registry not marked `[x]`.
    * Gather Archived PRDs from `.agents/archive/`.
    * Count Patterns.
    * Gather Git Stats (commits) and Test Coverage.
    * Output Markdown/JSON report to `.agents/export.[md|json]`.
    * Announce completion of export.

---

## 7.0 FINAL REPORT

Report:
"Flow Sync Complete!
- Backend: <bd|none>
- Flow synced: <flow_id>
- Updates made: <list files updated if any>
- workflow.md: <revalidated-needed|unchanged>
- tech-stack.md: <drift-detected|unchanged>
- Broken references fixed: <count>
- Export generated: <Yes/No>"

---

## Critical Rules
1.  **READ-ONLY ON BACKEND** - Only read from the active backend during sync. Do not close, block, or mutate tasks here
2.  **PRESERVE SPEC CONTENT** - Only update task status markers, not requirements text
3.  **DETECT DON'T ASSUME** - Verify before updating tech-stack.md or patterns.md
4.  **ASK FIRST** - Confirm documentation changes with user
5.  **NO HARDCODED BACKEND** - Support `bd` and markdown-only mode gracefully
"""
